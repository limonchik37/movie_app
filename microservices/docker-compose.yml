version: "3.9"

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  # ─── Services ──────────────────────────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - movie-service
      - review-service
    environment:
      USER_SERVICE_URL: http://user-service:8081
      MOVIE_SERVICE_URL: http://movie-service:8082
      REVIEW_SERVICE_URL: http://review-service:8083

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456789
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: RzExeWVaMTFGbTRtUmVwSk1KOWxQOXdhWXlpM3lEWTZCQ1Y4d0tZNkREOWJaTWFITzY2RWlsc1l6T1dPWDdrVnUtampmSnBkeFVPN2hzVjBnTE42M3c9PQ==
      JWT_EXPIRATION_MS: 3600000

  movie-service:
    build: ./movie-service
    container_name: movie-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movie_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456789
      JWT_SECRET: RzExeWVaMTFGbTRtUmVwSk1KOWxQOXdhWXlpM3lEWTZCQ1Y4d0tZNkREOWJaTWFITzY2RWlsc1l6T1dPWDdrVnUtampmSnBkeFVPN2hzVjBnTE42M3c9PQ==

  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/review_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456789
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: RzExeWVaMTFGbTRtUmVwSk1KOWxQOXdhWXlpM3lEWTZCQ1Y4d0tZNkREOWJaTWFITzY2RWlsc1l6T1dPWDdrVnUtampmSnBkeFVPN2hzVjBnTE42M3c9PQ==
      MOVIE_SERVICE_URL: http://movie-service:8082
      USER_SERVICE_URL: http://user-service:8081

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: noreply@movieapp.com
      MAIL_PASSWORD: changeme

volumes:
  postgres_data:
